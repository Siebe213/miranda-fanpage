<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Lore Quiz</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .back-btn { position: absolute; top: 20px; right: 20px; z-index: 10; }
        .quiz-container {
            width: 80%; max-width: 600px; background: var(--card-bg); border: 2px solid var(--primary-color);
            border-radius: 15px; padding: 3rem; text-align: center;
            box-shadow: 0 0 30px rgba(255,0,127,0.3); transform: perspective(1000px) rotateX(5deg);
        }
        .question { font-size: 2rem; font-family: var(--font-heading); margin-bottom: 2rem; }
        .options { display: flex; flex-direction: column; gap: 1rem; }
        .option-btn {
            background: #222; color: #fff; border: 1px solid #444; padding: 1rem;
            border-radius: 8px; cursor: pointer; font-size: 1.2rem; transition: all 0.2s;
        }
        .option-btn:hover { background: var(--primary-color); border-color: #fff; transform: scale(1.02); }
        .score { font-size: 1.5rem; margin-top: 2rem; color: var(--secondary-color); }
    </style>
</head>
<body>
    <a href="index.html" class="btn btn-secondary back-btn">Terug naar Hub</a>
    
    <div class="quiz-container">
        <div class="question" id="question">Klik om te starten!</div>
        <div class="options" id="options">
            <button class="option-btn" id="btn-start">Start Quiz</button>
        </div>
        <div class="score">Score: <span id="score">0</span></div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/game-quiz.js"></script>
</body>
</html>
