<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍩 Cheerio Catch 3D</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #1a001a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .hud { position: absolute; top: 20px; left: 20px; z-index: 10; display:flex; gap:20px;}
        .score-display, .lives-display { font-size: 2rem; font-family: var(--font-heading); color: var(--secondary-color); text-shadow: 0 0 10px var(--secondary-color); }
        .back-btn { position: absolute; top: 20px; right: 20px; z-index: 10; }
        #catchCanvas {
            background: linear-gradient(180deg, #1a001a 0%, #3a003a 100%);
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.5), inset 0 0 20px rgba(255, 0, 127, 0.2);
            transform: perspective(1000px) rotateX(15deg);
            border-radius: 10px;
        }
        .start-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); padding: 2rem; border-radius: 10px; border: 1px solid var(--primary-color);
            text-align: center; z-index: 20;
        }
    </style>
</head>
<body>
    <a href="index.html" class="btn btn-secondary back-btn">Terug naar Hub</a>
    <div class="hud">
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="lives-display">Levens: <span id="lives">3</span></div>
    </div>
    
    <div class="start-overlay" id="start-screen">
        <h2>Cheerio Catch 3D</h2>
        <p>Vang de vallende objecten! Gebruik Links/Rechts of A/D.</p>
        <button class="btn btn-primary" id="btn-start">Start Game</button>
    </div>

    <canvas id="catchCanvas" width="800" height="600"></canvas>

    <script src="js/game-catch.js"></script>
</body>
</html>
