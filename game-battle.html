<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Meme Mash</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050505; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .back-btn { position: absolute; top: 20px; right: 20px; z-index: 10; }
        .timer { font-size: 4rem; color: var(--secondary-color); font-family: var(--font-heading); margin-bottom: 2rem; text-shadow: 0 0 20px var(--secondary-color); }
        .mash-btn {
            width: 300px; height: 300px; border-radius: 50%;
            background: linear-gradient(145deg, #ff007f, #cc0066);
            border: 10px solid #fff;
            box-shadow: 0 10px 50px rgba(255,0,127,0.8), inset 0 -10px 20px rgba(0,0,0,0.5);
            font-size: 5rem; font-weight: bold; color: white;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            user-select: none; transition: transform 0.05s;
        }
        .mash-btn:active { transform: scale(0.95); box-shadow: 0 5px 30px rgba(255,0,127,0.8), inset 0 -5px 10px rgba(0,0,0,0.5); }
        .score-display { font-size: 3rem; margin-top: 2rem; color: #fff; }
    </style>
</head>
<body>
    <a href="index.html" class="btn btn-secondary back-btn">Terug naar Hub</a>
    
    <div class="timer" id="timer">10.0</div>
    <div class="mash-btn" id="mash-btn">MASH!</div>
    <div class="score-display">Score: <span id="score">0</span></div>

    <script src="js/game-battle.js"></script>
</body>
</html>
